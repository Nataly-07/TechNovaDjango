{% extends "frontend/base_tienda.html" %}
{% load static %}
{% block title %}Producto — Technova{% endblock %}
{% block body %}
<header class="header">
  <a href="{% url 'inicio_autenticado' %}" class="logo"><span>← TECHNOVA</span></a>
</header>
<main style="padding:2rem;max-width:900px;margin:0 auto;">
  <h1>Detalle producto #{{ producto_id }}</h1>
  <div id="page-data">Cargando…</div>
</main>
{% endblock %}
{% block extra_js %}
{{ block.super }}
<script src="{% static 'frontend/js/technova-pages.js' %}"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    TechnovaPages.productoDetalle({{ producto_id }});
  });
</script>
{% endblock %}
