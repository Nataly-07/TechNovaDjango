{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Technova{% endblock %}</title>
  <link href="https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'frontend/css/stilotech.css' %}">
  <link rel="stylesheet" href="{% static 'frontend/css/producto.css' %}">
  <link rel="stylesheet" href="{% static 'frontend/css/technova-swal.css' %}?v=2">
  {% block extra_css %}{% endblock %}
</head>
<body>
<form style="display:none" aria-hidden="true">{% csrf_token %}</form>
{% block body %}{% endblock %}
<script>
  window.TECHNOVA_API_PREFIX = "{{ TECHNOVA_API_PREFIX|default:'/api/v1' }}";
</script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="{% static 'frontend/js/technova-swal.js' %}?v=2"></script>
<script src="{% static 'frontend/js/technova-api.js' %}"></script>
<script src="{% static 'frontend/js/technova-auth.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
