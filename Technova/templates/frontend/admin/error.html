{% extends "frontend/base_admin.html" %}
{% load static %}

{% block title %}Error — Technova{% endblock %}

{% block content %}
<div style="text-align: center; padding: 3rem;">
    <div style="font-size: 4rem; color: #ef4444; margin-bottom: 1rem;">
        <i class="bx bx-error-circle"></i>
    </div>
    <h1 style="color: #0f172a; margin-bottom: 1rem;">Error del Sistema</h1>
    <p style="color: #64748b; font-size: 1.1rem; margin-bottom: 2rem;">{{ error }}</p>
    <a href="{% url 'web_admin_perfil' %}" class="btn-action btn-action--primary">
        <i class="bx bx-arrow-back"></i>
        Volver al Panel
    </a>
</div>

<style>
.btn-action {
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 8px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
}

.btn-action--primary {
    background: #3b82f6;
    color: white;
}

.btn-action--primary:hover {
    background: #2563eb;
}
</style>
{% endblock %}
