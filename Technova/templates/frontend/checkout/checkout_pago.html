{% extends "frontend/checkout/checkout_base.html" %}
{% block checkout_content %}
<h2 class="section-title">Forma de pago</h2>
<form method="post" action="{% url 'web_cliente_checkout_pago' %}" id="pagoForm">
  {% csrf_token %}
  <div style="display:flex;flex-direction:column;gap:14px;margin-top:10px;">
    <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:14px;border:2px solid #e5e7eb;border-radius:12px;background:#fff;">
      <input type="radio" name="metodoPago" value="paypal_sandbox" checked style="margin-top:4px;" />
      <span>
        <strong style="color:#667eea;">PayPal Sandbox</strong>
        <span style="display:block;color:#4b5563;font-size:0.95em;margin-top:4px;">Redireccion a PayPal Sandbox para pagar con tarjeta o cuenta PayPal (USD).</span>
      </span>
    </label>
  </div>
  <button type="submit" class="account cta" style="margin-top:18px;">Continuar</button>
</form>
<a href="{% url 'web_cliente_checkout_envio' %}" style="display:inline-block;margin-top:14px;color:#0ea5e9;font-weight:600;">← Anterior</a>
{% endblock %}
