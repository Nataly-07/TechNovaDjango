{# Requiere ``logo_src`` en el contexto (URL absoluta). Tabla + <td> con ancho fijo: Gmail a veces ignora width en <img>. #}
{% if logo_src %}
<table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center" style="margin:0 auto 20px auto;border-collapse:collapse;">
  <tr>
    <td width="58" style="width:58px;max-width:58px;text-align:center;padding:12px 0 16px;">
      {# PNG del correo: intrínseco ~3×; se muestra ~58px para nitidez (sin ampliar un bitmap 58px). #}
      <img src="{{ logo_src }}" alt="TechNova Logo" width="58" style="width:58px;max-width:58px;height:auto;display:block;margin:0 auto;border:0;outline:none;text-decoration:none;-ms-interpolation-mode:bicubic;">
    </td>
  </tr>
</table>
{% endif %}
