{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Technova{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'frontend/css/estilodas.css' %}">
  <link rel="stylesheet" href="{% static 'frontend/css/color-palette.css' %}">
  <link rel="stylesheet" href="{% static 'frontend/css/stilotech.css' %}">
  <link rel="stylesheet" href="{% static 'frontend/css/producto.css' %}?v=6">
  <link rel="stylesheet" href="{% static 'frontend/css/technova-swal.css' %}?v=2">
  <link rel="stylesheet" href="{% static 'frontend/css/admin-panel.css' %}?v=4">
  <link rel="stylesheet" href="{% static 'frontend/css/technova-home.css' %}?v=7">
  <link rel="stylesheet" href="{% static 'frontend/css/index-home.css' %}?v=12">
  <link rel="stylesheet" href="{% static 'frontend/css/technova-producto-gallery.css' %}?v=9">
  {% block extra_css %}{% endblock %}
  <script defer src="{% static 'frontend/js/technova-producto-gallery.js' %}?v=6"></script>
</head>
<body>
<form style="display:none" aria-hidden="true">{% csrf_token %}</form>
{% block body %}{% endblock %}
<script>
  window.TECHNOVA_API_PREFIX = "{{ TECHNOVA_API_PREFIX|default:'/api/v1' }}";
</script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="{% static 'frontend/js/technova-swal.js' %}?v=3"></script>
<script src="{% static 'frontend/js/carrito-alerts.js' %}?v=2"></script>
<script src="{% static 'frontend/js/carrito-mejorado.js' %}?v=1"></script>
<script src="{% static 'frontend/js/carrito-inline.js' %}?v=1"></script>
<script src="{% static 'frontend/js/technova-api.js' %}"></script>
<script src="{% static 'frontend/js/technova-auth.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
